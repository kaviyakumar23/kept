# Slack app manifest for Kept — paste at api.slack.com/apps → Create New App → From a manifest.
# Configures exactly what the code uses (src/server/slackApp.ts): message + app_home events,
# interactivity (confirm/verify/closure cards + edit modals + view_submission), the /kept
# command, the App Home ledger, and OAuth HTTP mode (the Marketplace deploy shape, W2).
#
# W2 / invariant #6 (Marketplace): production runs HTTP mode (Socket Mode OFF) with
# multi-workspace OAuth. Replace `kept.example.com` below with your App Runner host, then
# import the manifest. Bolt serves events, actions AND commands at ONE url: /slack/events;
# the install page is /slack/install and the OAuth callback is /slack/oauth_redirect.
#
# LOCAL DEV over Socket Mode instead: set socket_mode_enabled: true, generate an App-Level
# Token with `connections:write` (SLACK_APP_TOKEN), and leave SLACK_CLIENT_ID unset so the
# app boots the single-token path.
display_information:
  name: Kept
  description: Human-verified, event-sourced obligation ledger for shared customer channels.
  background_color: "#1f2d3d"

features:
  bot_user:
    display_name: Kept
    always_online: true
  app_home:
    home_tab_enabled: true
    # Messages tab must be ON (read-write) for the AI Assistant pane.
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  # AI Assistant pane — conversational ledger queries ("Slack AI capabilities").
  assistant_view:
    assistant_description: "Ask the obligation ledger: what's overdue, what we owe a customer, or what's waiting on you to verify."
    suggested_prompts:
      - "What's overdue?"
      - "What did we promise Acme this week?"
      - "Anything waiting on me to verify?"
  slash_commands:
    - command: /kept
      description: Show the obligation ledger for a customer
      usage_hint: "[customer]"
      should_escape: false

oauth_config:
  # W2 — OAuth callback for multi-workspace install (Bolt's default redirect path).
  redirect_urls:
    - https://kept.example.com/slack/oauth_redirect
  scopes:
    bot:
      - chat:write # post confirm/verify/closure cards, owner DMs, in-thread closure
      - im:write # open a DM with the owner for private cards (conversations.open)
      - im:history # read the user's messages in the AI Assistant thread
      - assistant:write # the AI Assistant pane: setStatus / setSuggestedPrompts / say
      - commands # the /kept slash command
      - channels:history # read messages in public channels Kept is in
      - groups:history # read messages in private / Slack Connect shared channels Kept is in
      - channels:read # channel metadata
      - groups:read # private/shared channel metadata
    # Uncomment to enable cross-channel RTS (KEPT_SLACK_USER_SEARCH=1) — needs a user token:
    # user:
    #   - search:read

settings:
  event_subscriptions:
    # W2 — HTTP mode: Slack POSTs events here (Bolt serves events/actions/commands at /slack/events).
    request_url: https://kept.example.com/slack/events
    bot_events:
      - message.channels # new message in a public channel → detect an obligation
      - message.groups # new message in a private / Slack Connect shared channel
      - message.im # user messages in the AI Assistant thread
      - app_home_opened # publish the App Home obligation-ledger dashboard
      - assistant_thread_started # AI Assistant pane opened → greet + suggested prompts
      - assistant_thread_context_changed # AI Assistant thread context updates
  interactivity:
    is_enabled: true # buttons, modals, and view_submission (edit-and-confirm / edit-the-reply)
    request_url: https://kept.example.com/slack/events # same single endpoint as events
  socket_mode_enabled: false # W2 / invariant #6 — Marketplace runs HTTP mode
  org_deploy_enabled: false # workspace-level installs only
  token_rotation_enabled: false
